version: "3.8"
services:
  api:
    build:
      context: ../backend
      dockerfile: ../deploy/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      POLICYMIND_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/policymind
      POLICYMIND_REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ../backend/src:/app/src:ro

  worker:
    build:
      context: ../backend
      dockerfile: ../deploy/docker/Dockerfile.worker
    depends_on:
      - redis
      - postgres
    volumes:
      - ../backend/src:/app/src:ro

  mcp-server:
    build:
      context: ../backend
      dockerfile: ../deploy/docker/Dockerfile.mcp
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/docker/Dockerfile.frontend
    ports:
      - "5173:80"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: policymind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  milvus:
    image: milvusdb/milvus:v2.4.0
    ports:
      - "19530:19530"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - milvusdata:/var/lib/milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcddata:/etcd

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  redisdata:
  miniodata:
  milvusdata:
  etcddata:
  neo4jdata:
  promdata:
  grafanadata:
